<div class="page">

      <h2>Departure Board</h2>
      <p>Fleet Carrier schedule feed</p>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Destination</th>
            <th>Status</th>
            <th>Note</th>

      </table>

    <div id="scheduleEmpty" class="empty" style="display:none; margin-top:14px;">

    </div>
  </section>
</div>
